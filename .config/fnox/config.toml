# OS keychain で秘匿値を保護する provider
[providers.keychain]
type = "keychain"
service = "fnox"

# Personal vault 用の 1Password service account
[providers.op_personal_develop]
type = "1password"
token = { secret = "OP_SA_PERSONAL_DEVELOP" }

# commit する暗号文 secret 用（基礎基盤・現状使用 secret 無し）。recipients=公開鍵 / identity=keychain。
# 使い方・背景は docs/fnox-token-management.md「age provider」
[providers.age]
type = "age"
recipients = ["age1y4mq7r60nh07uwz7xgurqxexzlkth8jx3jng4gmfaq0ne2vprass78qcm0"]
identity = { provider = "keychain", value = "AGE_IDENTITY" }

[secrets]
# op 認証用 SA token（実体は Keychain）。env=false で fnox exec の子 env に注入しない（漏れ防止）
OP_SA_PERSONAL_DEVELOP = { provider = "keychain", value = "OP_SA_PERSONAL_DEVELOP", env = false }

# npm registry token（op から live fetch・env 注入）
FLATT_NPM_TOKEN = { provider = "op_personal_develop", value = "op://personal-develop/ut45f4nuxkaoquisyrolp2vqqe/credential" }

# remote MCP token は mcp profile に隔離（default だと npm の fnox exec が毎回 op fetch するため）。
# helper(mcp-auth-header.sh)が fnox get --profile mcp で取得・OP_SA は default 継承。背景は docs
[profiles.mcp.secrets]
# GitHub Copilot remote MCP の PAT。get専用・exec では注入されない
GITHUB_MCP_TOKEN = { provider = "op_personal_develop", value = "op://personal-develop/GitHub MCP server token/token", env = false }
