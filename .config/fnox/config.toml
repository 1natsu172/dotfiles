# OS keychain で秘匿値を保護する provider
[providers.keychain]
type = "keychain"
service = "fnox"

# Personal vault 用の 1Password service account
[providers.op_personal_develop]
type = "1password"
token = { secret = "OP_SA_PERSONAL_DEVELOP" }

[secrets]
# SA トークン本体（実体は macOS Keychain 内、ここは参照のみ）。
# env = false: provider 認証の token 解決には使うが fnox exec で子プロセス env へは注入しない
# （生 SA トークンが npm 等の子・postinstall に露出するのを防ぐ。fnox 1.26.0+ の SecretConfig.env）。
OP_SA_PERSONAL_DEVELOP = { provider = "keychain", value = "OP_SA_PERSONAL_DEVELOP", env = false }

# 実際に欲しい secret（op から live で fetch）
FLATT_NPM_TOKEN = { provider = "op_personal_develop", value = "op://personal-develop/ut45f4nuxkaoquisyrolp2vqqe/credential" }

# Claude Code の remote(HTTP) MCP 用 token。mcp profile に置いて npm 等の default `fnox exec` の
# 解決スコープから外す（env=false は「注入」を止めるだけで「解決(op fetch)」は走るため、default に
# 置くと npm 実行毎に無駄な op fetch が発生する。profile 分離なら default exec の解決対象外）。
# headersHelper(bin/claude-utils/mcp-auth-header.sh) が `fnox get --profile mcp` で接続時に fetch する。
# provider 認証用の OP_SA は default [secrets] から継承する（helper は --no-defaults を付けないため、
# 各 profile での OP_SA 再宣言は不要）。
[profiles.mcp.secrets]
# GitHub Copilot remote MCP サーバ群の PAT。
# get専用・execでは注入されない
GITHUB_MCP_TOKEN = { provider = "op_personal_develop", value = "op://personal-develop/GitHub MCP server token/token", env = false }
