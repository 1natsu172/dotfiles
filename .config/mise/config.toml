[tools]
node = "24"
"npm:corepack" = "latest"
bun = "latest"
yarn = "1"
ruby = "3.2"
go = "latest"
uv = "latest"
age = "latest"
sops = "latest"
fnox = "latest"
# https://mise.jdx.dev/dev-tools/backends/gem.html
"gem:cocoapods" = "1.16.2"
# https://github.com/perplexityai/bumblebee Check exposure to known software supply-chain compromises.
"go:github.com/perplexityai/bumblebee/cmd/bumblebee" = "v0.1.1"

[settings]
experimental = true

[env]
# Make XDG-aware tools (e.g. pnpm 11+ -> ~/.config/pnpm/config.yaml) use ~/.config
# instead of the macOS default ~/Library/Preferences. Set here (not per-shell) so
# fish/bash/zsh and mise shims all inherit it via mise activation. env-paths-based
# tools (astro, eas-cli, …) ignore XDG and stay in ~/Library.
XDG_CONFIG_HOME = "{{env.HOME}}/.config"
SOPS_AGE_KEY_FILE = "{{config_root}}/.config/mise/age.txt"
# !DO NOT COMMIT THIS FILE TO GIT!
# Load my secret env from the file to this config file and redacts the values
_.file = { path = "~/dotfiles/.env.enc.json", redact = true }
# Prepend fnox shim dir so npm/yarn/bun/... resolve to the fnox-exec wrappers
# (~/dotfiles/bin/fnox-shims). Inherited by fish/bash/zsh and non-interactive
# subshells, so AI tools' `bash -c npm ...` also route through fnox.
_.path = ["~/dotfiles/bin/fnox-shims"]
