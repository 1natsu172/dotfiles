[tools]
node = "24"
bun = "latest"
# Global default yarn for projects without a packageManager field. Projects that
# pin a version via package.json `packageManager` (e.g. yarn@4) override this
# per-project (see [settings] idiomatic_version_file_enable_tools below).
yarn = "1"
ruby = "3.2"
go = "latest"
uv = "latest"
age = "latest"
sops = "latest"
fnox = "latest"
# https://mise.jdx.dev/dev-tools/backends/gem.html
"gem:cocoapods" = "1.16.2"
# https://github.com/perplexityai/bumblebee Check exposure to known software supply-chain compromises.
"go:github.com/perplexityai/bumblebee/cmd/bumblebee" = "v0.1.1"
java = "zulu-17"

[settings]
experimental = true
# Read package.json `packageManager` / `devEngines.packageManager` and node's
# `.nvmrc` / `.node-version` as idiomatic version files, so mise resolves the
# project-pinned version per-project (the corepack replacement; node also auto-
# resolves idiomatically instead of being pinned only via [tools]).
# npm's backend is `npm:npm` (mise installs npm by *running* npm via PATH). The fnox
# token wrappers are shell functions (bin/install-fnox-shell-wrappers), NOT a PATH shim,
# so mise's subprocesses don't inherit them: mise's bootstrap npm is the real one and
# per-project npm pinning installs without recursion. See docs/fnox-token-management.md.
idiomatic_version_file_enable_tools = ["node", "pnpm", "yarn", "npm"]

[env]
# Make XDG-aware tools (e.g. pnpm 11+ -> ~/.config/pnpm/config.yaml) use ~/.config
# instead of the macOS default ~/Library/Preferences. Set here (not per-shell) so
# fish/bash/zsh and mise shims all inherit it via mise activation. env-paths-based
# tools (astro, eas-cli, …) ignore XDG and stay in ~/Library.
XDG_CONFIG_HOME = "{{env.HOME}}/.config"
